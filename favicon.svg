<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49a2a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Navy blue background with rounded corners -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)" />

  <!-- Globe circle -->
  <circle cx="32" cy="21" r="11" fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.75"/>
  <!-- Globe equator ellipse -->
  <ellipse cx="32" cy="21" rx="11" ry="4.5" fill="none" stroke="url(#gold)" stroke-width="1.3" opacity="0.55"/>
  <!-- Globe vertical meridian -->
  <line x1="32" y1="10" x2="32" y2="32" stroke="url(#gold)" stroke-width="1.3" opacity="0.55"/>
  <!-- Globe top arc -->
  <path d="M21 21 Q32 15.5 43 21" fill="none" stroke="url(#gold)" stroke-width="1.3" opacity="0.55"/>

  <!-- GES lettering -->
  <text
    x="32"
    y="51"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="900"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="2"
  >GES</text>

  <!-- Thin gold underline accent -->
  <rect x="16" y="54" width="32" height="2" rx="1" fill="url(#gold)" opacity="0.6"/>
</svg>
